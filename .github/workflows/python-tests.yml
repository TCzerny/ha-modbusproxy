name: Python tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r modbus-proxy/requirements.txt
          .venv/bin/pip install -r modbus-proxy/requirements-dev.txt
      - name: Run tests
        run: .venv/bin/pytest modbus-proxy -q
