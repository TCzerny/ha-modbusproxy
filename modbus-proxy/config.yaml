name: "Modbus Proxy"
version: "2.2.6"
slug: "modbus_proxy"
description: "A powerful multi-device Modbus TCP and RTU proxy"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
url: "https://github.com/TCzerny/ha-modbusproxy"
startup: services
init: false
host_network: true
uart: true
udev: true
devices:
  # USB-Seriell-Adapter (CH340, CP210x, FTDI, Prolific, etc.)
  - /dev/ttyUSB0
  - /dev/ttyUSB1
  - /dev/ttyUSB2
  - /dev/ttyUSB3
  - /dev/ttyUSB4
  - /dev/ttyUSB5
  - /dev/ttyUSB6
  - /dev/ttyUSB7
  - /dev/ttyUSB8
  - /dev/ttyUSB9

  # ACM-Geräte (CDC-ACM Treiber, oft bei CH340/CP210x)
  - /dev/ttyACM0
  - /dev/ttyACM1
  - /dev/ttyACM2
  - /dev/ttyACM3
  - /dev/ttyACM4

  # Onboard-UARTs (z. B. Raspberry Pi GPIO)
  - /dev/ttyAMA0
  - /dev/ttyAMA1
  - /dev/ttyAMA2
  - /dev/ttyAMA3
  - /dev/ttyAMA4
  - /dev/ttyAMA5

  # Klassische serielle Ports (falls vorhanden)
  - /dev/ttyS0
  - /dev/ttyS1
  - /dev/ttyS2
  - /dev/ttyS3
  - /dev/ttyS4
  - /dev/ttyS5
  - /dev/ttyS6
  - /dev/ttyS7

  # Symlinks über udev (stabiler bei mehreren Adaptern)
  # Hier musst du exemplarisch die gängigsten Chipsätze aufnehmen
  - /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0        # CH340
  - /dev/serial/by-id/usb-1a86_USB2.0-Serial-if00-port0     # CH341
  - /dev/serial/by-id/usb-FTDI_USB_Serial_Converter-if00-port0
  - /dev/serial/by-id/usb-FTDI_FT232R_USB_UART-if00-port0   # FT232
  - /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller-if00-port0
  - /dev/serial/by-id/usb-Silicon_Labs_CP2104_USB_to_UART_Bridge_Controller-if00-port0
  - /dev/serial/by-id/usb-Prolific_Technology_Inc._USB-Serial_Controller-if00-port0
  - /dev/serial/by-id/usb-Prolific_Technology_Inc._USB-Serial_Controller_D-if00-port0  # PL2303
  
options:
  log_level: "info"
  auto_detect_device: true
  modbus_devices:
    - name: "Solar Inverter 1"
      protocol: "tcp"
      host: "192.168.1.100"
      port: 502
      bind_port: 502
      timeout: 10.0
      connection_time: 0.1
    - name: "RTU Device 1"
      protocol: "rtu"
      device: "/dev/ttyUSB0"
      baudrate: 9600
      databits: 8
      stopbits: 1
      parity: "N"
      bind_port: 504
      timeout: 5.0
      connection_time: 0.1
    - name: "Auto-Detected Serial Device"
      protocol: "rtu"
      baudrate: 115200
      databits: 8
      stopbits: 1
      parity: "N"
      bind_port: 505
      timeout: 3.0
      connection_time: 0.1
      unit_id_remapping: "1<>10"
schema:
  log_level: "list(info|warning|error|debug)?"
  auto_detect_device: "bool?"
  modbus_devices:
    - name: "str"
      protocol: "list(tcp|rtu|rtutcp|udp)"
      # TCP Modbus parameters
      host: "str?"
      port: "port?"
      # UDP Modbus parameters
      byte_mapping: "str?"      # map the Modbus TCP request to an outgoing UDP packet
      # Supported template tokens for `byte_mapping`:
      #  - {SEQ}: two bytes transaction id (MBAP bytes 0-1)
      #  - {LEN}, {LEN+N}, {LEN-N}: two-byte MBAP length (MBAP bytes 4-5) +/- offset
      #  - {ID}: unit id (first byte of PDU)
      #  - {PAYLOAD}: PDU bytes (skip unit id if {ID} was emitted before)
      #  - {CRC}: little-endian Modbus RTU CRC computed over the most-recent payload
      # Literal hex may be included outside braces, e.g. "FF 00 01".
      reverse_byte_mapping: "str?"      # map the UDP response packet back to a Modbus TCP reply
      # Supported template tokens for `reverse_byte_mapping`:
      #  - {SEQ}: two bytes transaction id taken from the last TCP request
      #  - {LEN}, {LEN+N}, {LEN-N}: two-byte length computed from the UDP payload length
      #  - {ID}: unit id extracted from the UDP response (first byte)
      #  - {PAYLOAD}: UDP payload (skip unit id if {ID} was emitted before)
      #  - {CRC}: CRC may be requested but is usually not needed for TCP replies
      # If the expanded reverse template contains a full MBAP header, the implementation
      # validates the embedded Length field; if it differs from the UDP payload size
      # the MBAP Length is corrected using the last request's MBAP header so the
      # resulting TCP reply length always matches the device payload.
      set_client_address: "str?"      # Set server IP address and port that the device will respond to
      set_client_address_response: "str?"  # Response expected for successful server query command
      # RTU/Serial Modbus parameters
      device: "str?"
      baudrate: "int?"
      databits: "int?"
      stopbits: "int?"
      parity: "str?"
      # Common parameters
      bind_port: "port"
      unit_id_remapping: "str?"
      timeout: "float?"
      connection_time: "float?"
